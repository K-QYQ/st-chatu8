name: Analyze resolution implementation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout analysis branch
        uses: actions/checkout@v4
        with:
          ref: analysis-auto-resolution

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Deobfuscate bundle
        run: npx --yes webcrack index.js > deobfuscated.js

      - name: Extract dimension parsing statements
        run: |
          mkdir -p analysis/exact
          python - <<'PY'
          import re
          from pathlib import Path
          text = Path('deobfuscated.js').read_text(encoding='utf-8', errors='replace')
          lines = text.splitlines()
          pats = [
              re.compile(r'\.split\(["\'][x×]["\']\)', re.I),
              re.compile(r'\.match\([^\n]{0,300}[x×][^\n]{0,300}\)', re.I),
              re.compile(r'new RegExp\([^\n]{0,300}[x×]', re.I),
              re.compile(r'%width%|%height%', re.I),
              re.compile(r'\.replace\([^\n]{0,300}%width%|\.replace\([^\n]{0,300}%height%', re.I),
              re.compile(r'(?:width|height)\s*=\s*(?:parseInt|Number|Math\.)', re.I),
              re.compile(r'(?:1216|832)\s*[,}:]|[,:{]\s*(?:1216|832)', re.I),
          ]
          out=[]; seen=set()
          for i,line in enumerate(lines):
              if len(line)>1800 or not any(p.search(line) for p in pats):
                  continue
              start=max(0,i-12); end=min(len(lines),i+18)
              key=(start,end)
              if key in seen: continue
              seen.add(key)
              out.append('\n'+'='*100+f'\nLINES {start+1}-{end}\n')
              out.extend(f'{j+1:06d}: {lines[j]}\n' for j in range(start,end))
          Path('analysis/exact/dimension-statements.txt').write_text(''.join(out),encoding='utf-8')
          PY

      - name: Commit analysis result
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add analysis/exact/dimension-statements.txt
          git diff --cached --quiet && exit 0
          git commit -m "chore: record dimension parsing statements [skip ci]"
          git push origin analysis-auto-resolution

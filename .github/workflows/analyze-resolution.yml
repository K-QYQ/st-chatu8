name: Analyze resolution implementation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout analysis branch
        uses: actions/checkout@v4
        with:
          ref: analysis-auto-resolution

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Deobfuscate bundle
        run: npx --yes webcrack index.js > deobfuscated.js

      - name: Extract exact pipeline
        run: |
          mkdir -p analysis/exact
          python - <<'PY'
          import re
          from pathlib import Path
          text = Path('deobfuscated.js').read_text(encoding='utf-8', errors='replace')

          def function_block(name, limit=20000):
              start = text.find('function ' + name)
              if start < 0:
                  return 'NOT FOUND\n'
              next_match = re.search(r'\nfunction\s+[A-Za-z_$][\w$]*\s*\(', text[start + 20:])
              end = start + 20 + next_match.start() if next_match else min(len(text), start + limit)
              return text[start:min(end, start + limit)]

          Path('analysis/exact/convertNewXmlFormatToOld.txt').write_text(
              function_block('convertNewXmlFormatToOld'), encoding='utf-8')
          Path('analysis/exact/parsePromptStringWithCoordinates.txt').write_text(
              function_block('parsePromptStringWithCoordinates'), encoding='utf-8')

          # Keep only short source lines containing literal dimension values or assignment/replacement logic.
          lines = text.splitlines()
          patterns = [
              re.compile(r'1216|832'),
              re.compile(r'replace\([^\n]*(?:%width%|%height%)', re.I),
              re.compile(r'(?:width|height).*(?:prompt|tag|scene|size)', re.I),
              re.compile(r'(?:prompt|tag|scene|size).*(?:width|height)', re.I),
          ]
          out = []
          for i, line in enumerate(lines):
              if len(line) > 1200:
                  continue
              if any(p.search(line) for p in patterns):
                  start = max(0, i - 8); end = min(len(lines), i + 12)
                  out.append('\n' + '='*90 + f'\nLINES {start+1}-{end}\n')
                  out.extend(f'{j+1:06d}: {lines[j]}\n' for j in range(start, end))
          Path('analysis/exact/dimension-logic.txt').write_text(''.join(out), encoding='utf-8')
          PY

      - name: Commit analysis result
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add analysis/exact
          git diff --cached --quiet && exit 0
          git commit -m "chore: record exact resolution pipeline [skip ci]"
          git push origin analysis-auto-resolution

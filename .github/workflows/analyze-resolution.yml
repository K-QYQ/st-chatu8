name: Analyze resolution implementation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout analysis branch
        uses: actions/checkout@v4
        with:
          ref: analysis-auto-resolution

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Deobfuscate bundle
        run: |
          npx --yes webcrack index.js > deobfuscated.js

      - name: Extract focused resolution code
        run: |
          mkdir -p analysis
          python - <<'PY'
          import re
          from pathlib import Path

          text = Path('deobfuscated.js').read_text(encoding='utf-8', errors='replace')
          lines = text.splitlines()
          patterns = [
              re.compile(r'<\/?size>', re.I),
              re.compile(r'resolution', re.I),
              re.compile(r'request_image_(?:resolution|aspect_ratio)', re.I),
              re.compile(r'1216|832'),
              re.compile(r'%width%|%height%', re.I),
              re.compile(r'dataset\.(?:width|height|size)', re.I),
              re.compile(r'\b(?:width|height)\b\s*[:=]', re.I),
              re.compile(r'\d+\s*[x×]\s*\d+', re.I),
          ]

          hit_lines = []
          for i, line in enumerate(lines):
              if any(p.search(line) for p in patterns):
                  hit_lines.append(i)

          windows = []
          for i in hit_lines:
              start = max(0, i - 18)
              end = min(len(lines), i + 28)
              if windows and start <= windows[-1][1] + 3:
                  windows[-1] = (windows[-1][0], max(windows[-1][1], end))
              else:
                  windows.append((start, end))

          out = [f'TOTAL_LINES={len(lines)}\nHIT_LINES={len(hit_lines)}\nWINDOWS={len(windows)}\n']
          for n, (start, end) in enumerate(windows[:80], 1):
              out.append('\n' + '=' * 100 + '\n')
              out.append(f'WINDOW {n}: lines {start + 1}-{end}\n')
              for j in range(start, end):
                  out.append(f'{j + 1:06d}: {lines[j]}\n')

          Path('analysis/resolution-focused.txt').write_text(''.join(out), encoding='utf-8')
          PY

      - name: Commit analysis result
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add analysis/resolution-focused.txt
          git diff --cached --quiet && exit 0
          git commit -m "chore: record focused resolution analysis [skip ci]"
          git push origin analysis-auto-resolution

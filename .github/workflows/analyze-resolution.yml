name: Analyze resolution implementation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout analysis branch
        uses: actions/checkout@v4
        with:
          ref: analysis-auto-resolution

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Deobfuscate bundle
        run: |
          npx --yes webcrack index.js > deobfuscated.js

      - name: Extract resolution-related code
        run: |
          mkdir -p analysis
          python - <<'PY'
          import re
          from pathlib import Path

          text = Path('deobfuscated.js').read_text(encoding='utf-8', errors='replace')
          patterns = [
              r'<size>', r'</size>', r'1216', r'832', r'resolution',
              r'width', r'height', r'image[_-]?size', r'prompt.*size',
              r'dataset\.(?:width|height|size)', r'prompt[_-]?(?:width|height)',
          ]
          regex = re.compile('|'.join(f'(?:{p})' for p in patterns), re.I)
          matches = list(regex.finditer(text))
          out = [f'TOTAL_MATCHES={len(matches)}\n']
          seen = set()

          for match in matches:
              start = max(0, match.start() - 900)
              end = min(len(text), match.end() + 1200)
              snippet = text[start:end]
              key = re.sub(r'\s+', ' ', snippet[:400])
              if key in seen:
                  continue
              seen.add(key)
              out.append('\n' + '=' * 100 + '\n')
              out.append(f'MATCH={match.group(0)!r} OFFSET={match.start()}\n')
              out.append(snippet + '\n')
              if len(seen) >= 120:
                  break

          Path('analysis/resolution-snippets.txt').write_text(''.join(out), encoding='utf-8')
          PY

      - name: Commit analysis result
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add analysis/resolution-snippets.txt
          git diff --cached --quiet && exit 0
          git commit -m "chore: record temporary resolution analysis [skip ci]"
          git push origin analysis-auto-resolution

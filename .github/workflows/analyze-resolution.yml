name: Analyze resolution implementation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout analysis branch
        uses: actions/checkout@v4
        with:
          ref: analysis-auto-resolution

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Deobfuscate bundle
        run: |
          npx --yes webcrack index.js > deobfuscated.js

      - name: Extract focused resolution code
        run: |
          mkdir -p analysis/focused
          python - <<'PY'
          import re
          from pathlib import Path

          text = Path('deobfuscated.js').read_text(encoding='utf-8', errors='replace')
          groups = {
              'size-tag': re.compile(r'<\/?size>', re.I),
              'resolution': re.compile(r'resolution|request_image_(?:resolution|aspect_ratio)', re.I),
              'dimensions': re.compile(r'1216|832'),
              'placeholders': re.compile(r'%width%|%height%', re.I),
              'dataset': re.compile(r'dataset\.(?:width|height|size)|data-(?:width|height|size)', re.I),
              'dimension-regex': re.compile(r'\d+\s*[x×]\s*\d+|[x×]\s*\d+|\d+\s*[x×]', re.I),
          }

          for name, regex in groups.items():
              matches = list(regex.finditer(text))
              out = [f'GROUP={name}\nTOTAL_MATCHES={len(matches)}\n']
              seen = set()
              kept = 0
              for match in matches:
                  start = max(0, match.start() - 1400)
                  end = min(len(text), match.end() + 1800)
                  snippet = text[start:end]
                  key = re.sub(r'\s+', ' ', snippet[:500])
                  if key in seen:
                      continue
                  seen.add(key)
                  kept += 1
                  out.append('\n' + '=' * 100 + '\n')
                  out.append(f'MATCH={match.group(0)!r} OFFSET={match.start()}\n')
                  out.append(snippet + '\n')
                  if kept >= 12:
                      break
              Path(f'analysis/focused/{name}.txt').write_text(''.join(out), encoding='utf-8')
          PY

      - name: Commit analysis result
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add analysis/focused
          git diff --cached --quiet && exit 0
          git commit -m "chore: record split resolution analysis [skip ci]"
          git push origin analysis-auto-resolution
